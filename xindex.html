      const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInJlZiI6ImV0Ymp5bXl4aWVra2t2cXdjeWdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NTY2OTIsImV4cCI6MjA5NDQzMjY5Mn0.3rBdjPi3lqKW1erTPm_URxDpqrjMbelqidaP69uUowM".replace("eyJpc3MiOiJIUzI1NiIs", "eyJpc3MiOiJzdXBhYmFzZSIs"); [cite: 80]

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>'"]/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;" })[char]); [cite: 83]

      function withTimeout(promise, ms = 8000) {
        let timer; [cite: 91]

          timer = setTimeout(() => reject(new Error("Yhteys aikakatkaistiin. Päivitä sivu.")), ms); [cite: 92]
        });
        return Promise.race([promise, timeout]).finally(() => clearTimeout(timer)); [cite: 93]

      function readSession() {
        try { return JSON.parse(localStorage.getItem(SESSION_KEY) || "null"); } [cite: 93, 94]

      function saveSession(nextSession) {
        session = nextSession; [cite: 95, 96]

      function headers(prefer) {
        const token = session?.access_token || SUPABASE_KEY; [cite: 97, 98]
        return {
          apikey: SUPABASE_KEY, [cite: 98]

      async function request(url, options = {}) {
        const res = await withTimeout(fetch(url, options)); [cite: 99]
        if (!res.ok) {
          const body = await res.text().catch(() => ""); [cite: 100]
          throw new Error(body || res.statusText || "Pyyntö epäonnistui"); [cite: 101]
        }
        if (res.status === 204) return null; [cite: 101]
        return res.json(); [cite: 102]
      }

      const restUrl = (table, query = "") => `${SUPABASE_URL}/rest/v1/${table}${query}`; [cite: 102]
      const eq = (value) => `eq.${encodeURIComponent(value)}`; [cite: 103]
      const select = (table, query) => request(restUrl(table, query), { headers: headers() }); [cite: 103]

      async function cachedSelect(table, query) {
        const key = `${table}${query}|${session?.access_token ? "auth" : "anon"}`; [cite: 104]
        const hit = selectCache.get(key); [cite: 105]
        if (hit && Date.now() - hit.time < CACHE_MS) return hit.data; [cite: 105]
        const data = await select(table, query); [cite: 105]
        selectCache.set(key, { time: Date.now(), data }); [cite: 106]
        return data; [cite: 106]
      }

      function clearDataCache() { selectCache.clear(); } [cite: 106, 107]

      const insert = (table, body) => request(restUrl(table), { method: "POST", headers: headers("return=representation"), body: JSON.stringify(body) }); [cite: 107]
      const update = (table, query, body) => request(restUrl(table, query), { method: "PATCH", headers: headers("return=representation"), body: JSON.stringify(body) }); [cite: 108]
      const remove = (table, query) => request(restUrl(table, query), { method: "DELETE", headers: headers(), body: undefined }); [cite: 109]

      async function hasAdminRole() {

      function renderInline(nodes = []) {
        if (!Array.isArray(nodes)) return "";
        return nodes.map((n) => {
          if (n.type === "hardBreak") return "<br>"; [cite: 120]
          let out = esc(n.text ?? ""); [cite: 120]
          for (const m of n.marks ?? []) {
            if (m.type === "bold") out = `<strong>${out}</strong>`; [cite: 120, 121]
            if (m.type === "italic") out = `<em>${out}</em>`; [cite: 120, 121]
            if (m.type === "code") out = `<code>${out}</code>`; [cite: 121]
          }
          return out;
        }).join(""); [cite: 121, 122]
      }

      function renderDoc(doc) {
        if (!doc) return "";
        if (typeof doc === "string") return `<p>${esc(doc)}</p>`;
        const nodes = doc && typeof doc === "object" ? doc.content ?? [] : []; [cite: 122, 123]
        return nodes.map((n) => {
          if (n.type === "paragraph") return `<p>${renderInline(n.content)}</p>`; [cite: 123]
          if (n.type === "heading") { const level = Math.min(Math.max(Number(n.attrs?.level || 2), 1), 3); return `<h${level}>${renderInline(n.content)}</h${level}>`; } [cite: 123]
          if (n.type === "blockquote") return `<blockquote>${renderDoc({ content: n.content })}</blockquote>`; [cite: 123, 124]
          if (n.type === "bulletList") return `<ul>${(n.content ?? []).map((li) => `<li>${renderDoc({ content: li.content })}</li>`).join("")}</ul>`; [cite: 124]
          if (n.type === "orderedList") return `<ol>${(n.content ?? []).map((li) => `<li>${renderDoc({ content: li.content })}</li>`).join("")}</ol>`; [cite: 124, 125]
          return "";
        }).join(""); [cite: 125]
      }

      function docToText(doc) {
        if (!doc) return "";
        if (typeof doc === "string") return doc;
        const out = []; [cite: 125, 126]
        const walk = (nodes = []) => (nodes || []).forEach((n) => {
          if (n.text) out.push(n.text); [cite: 126]
          if (n.type === "paragraph" || n.type === "heading") out.push("\n\n"); [cite: 126, 127]
          if (n.content) walk(n.content); [cite: 127]
        });
        walk(doc?.content ?? []); [cite: 127]
        return out.join("").replace(/\n{3,}/g, "\n\n").trim(); [cite: 127]
      }

      function textToDoc(text) {
        const paragraphs = String(text || "").split(/\n\s*\n/).map((p) => p.trim()).filter(Boolean); [cite: 127]
        return { type: "doc", content: (paragraphs.length ? paragraphs : [""]).map((p) => ({ type: "paragraph", content: p ? [{ type: "text", text: p }] : [] })) }; [cite: 128, 129]

      // PROSEMIRROR / HTML MUUNNOSFUNKTIOT ADMIN-PANEELILLE
      const inlineFromNode = (node, marks = []) => {
        if (node.nodeType === 3) {
          const t = node.nodeValue; [cite: 173]
          return t ? [{ type: "text", text: t, ...(marks.length ? { marks: marks.map((m) => ({ type: m })) } : {}) }] : []; [cite: 174, 175]
        }
        if (node.nodeType !== 1) return []; [cite: 175]
        const tag = node.tagName; [cite: 175, 176]
        if (tag === "BR") return [{ type: "hardBreak" }]; [cite: 176]
        const next = marks.slice(); [cite: 176]
        if (tag === "STRONG" || tag === "B") next.push("bold"); [cite: 177]
        if (tag === "EM" || tag === "I") next.push("italic"); [cite: 177]
        const out = []; [cite: 177, 178]
        node.childNodes.forEach((c) => out.push(...inlineFromNode(c, next))); [cite: 178]
        return out;
      };

      const inlineFrom = (el) => {
        const out = []; [cite: 179]
        el.childNodes.forEach((c) => out.push(...inlineFromNode(c))); [cite: 180]
        return out;
      };

      const blockFromEl = (el) => {
        const tag = el.tagName; [cite: 180]
        if (tag === "H1") return { type: "heading", attrs: { level: 1 }, content: inlineFrom(el) }; [cite: 181]
        if (tag === "H2") return { type: "heading", attrs: { level: 2 }, content: inlineFrom(el) }; [cite: 182]
        if (tag === "H3") return { type: "heading", attrs: { level: 3 }, content: inlineFrom(el) }; [cite: 183]
        if (tag === "BLOCKQUOTE") {
          const inner = []; [cite: 184]
          el.childNodes.forEach((c) => { const b = blockFromAny(c); if (b) inner.push(...(Array.isArray(b) ? b : [b])); }); [cite: 185]
          return { type: "blockquote", content: inner.length ? inner : [{ type: "paragraph", content: inlineFrom(el) }] }; [cite: 186]
        }
        if (tag === "UL" || tag === "OL") {
          const items = Array.from(el.children).filter((c) => c.tagName === "LI").map((li) => ({ type: "listItem", content: [{ type: "paragraph", content: inlineFrom(li) }] })); [cite: 187]
          return { type: tag === "UL" ? "bulletList" : "orderedList", content: items }; [cite: 188]
        }
        return { type: "paragraph", content: inlineFrom(el) }; [cite: 189]
      };

      const blockFromAny = (node) => {
        if (node.nodeType === 3) {
          const t = node.nodeValue.trim(); [cite: 190]
          return t ? { type: "paragraph", content: [{ type: "text", text: node.nodeValue }] } : null; [cite: 191]
        }
        if (node.nodeType !== 1) return null; [cite: 192]
        return blockFromEl(node); [cite: 192]
      };

      const htmlToDoc = (el) => {
        const content = []; [cite: 193]
        el.childNodes.forEach((n) => { const b = blockFromAny(n); if (b) content.push(b); }); [cite: 194]
        return { type: "doc", content: content.length ? content : [{ type: "paragraph", content: [] }] }; [cite: 194, 195]
      };

      function setupFormatBar() {

        const getEditableHost = () => {
          const sel = window.getSelection(); [cite: 212]
          if (!sel || sel.rangeCount === 0) return null; [cite: 213]
          let n = sel.anchorNode; [cite: 213]
          while (n && n !== document.body) {
            if (n.nodeType === 1 && n.getAttribute && n.getAttribute("contenteditable") === "true" && n.dataset.field === "content") return n; [cite: 214]
            n = n.parentNode; [cite: 215]
          }
          return null;
        };
        const findBlock = (node, host) => {
          while (node && node !== host) {
            if (node.nodeType === 1 && /^(P|H1|H2|H3|BLOCKQUOTE|LI|UL|OL)$/.test(node.tagName)) return node; [cite: 216]
            node = node.parentNode; [cite: 217]
          }
          return null;
        };
        const toggleBlockquote = () => {
          const sel = window.getSelection(); [cite: 218]
          const host = getEditableHost(); [cite: 219]
          if (!host || !sel.rangeCount) return; [cite: 219]
          let node = sel.anchorNode; [cite: 219]
          if (node && node.nodeType === 3) node = node.parentNode; [cite: 220]
          const bq = (function () { let n = node; while (n && n !== host) { if (n.tagName === "BLOCKQUOTE") return n; n = n.parentNode; } return null; })(); [cite: 220]
          if (bq) {

          } else {

            const wrap = document.createElement("blockquote"); [cite: 223]

          }
        };
        const updateBarState = () => {
          const host = getEditableHost(); [cite: 224]
          if (!host) { bar.classList.remove("show"); return; } [cite: 225]
          const sel = window.getSelection(); [cite: 225]
          if (!sel.rangeCount || sel.isCollapsed) { bar.classList.remove("show"); return; } [cite: 226]
          const rect = sel.getRangeAt(0).getBoundingClientRect(); [cite: 226]
          if (!rect.width && !rect.height) { bar.classList.remove("show"); return; } [cite: 227]
          bar.classList.add("show"); [cite: 227]
          const barRect = bar.getBoundingClientRect(); [cite: 228]
          const top = rect.top + window.scrollY - barRect.height - 8; [cite: 228]
          const left = Math.max(8, rect.left + window.scrollX + rect.width / 2 - barRect.width / 2); [cite: 229]
          bar.style.top = `${Math.max(window.scrollY + 8, top)}px`; [cite: 230]
          bar.style.left = `${left}px`; [cite: 230]
          bar.querySelectorAll("button[data-cmd]").forEach((b) => { try { b.classList.toggle("active", document.queryCommandState(b.dataset.cmd)); } catch { } }); [cite: 230]
        };
        document.addEventListener("selectionchange", updateBarState); [cite: 231]
        window.addEventListener("scroll", updateBarState, { passive: true }); [cite: 231]
        window.addEventListener("resize", updateBarState); [cite: 231]
      }

        paint(`<a class="back" href="#/admin">← Hallinta</a><section class="panel"><h1 style="font-size:40px">Kirjan tiedot</h1><div class="field"><label>Otsikko</label><input id="title" value="${esc(currentBook.title)}"></div><div class="field"><label>Kirjoittaja</label><input id="author" value="${esc(currentBook.author)}"></div><div class="field"><label>Kuvaus</label><textarea id="desc">${esc(currentBook.description ?? "")}</textarea></div><div class="row"><button id="saveBook">Tallenna</button><button class="danger" id="deleteBook">Poista</button><span id="bookMsg" class="muted small"></span></div></section><section class="panel"><h2>Luvut</h2><div id="chapters">${chapters.map((c) => `<div class="chapter-edit"><div class="row"><input data-title="${esc(c.id)}" value="${esc(c.title)}"><button class="secondary" data-save-chapter="${esc(c.id)}">Tallenna</button><button class="secondary" data-open="${esc(c.id)}">Osiot</button><button class="danger" data-del-chapter="${esc(c.id)}">Poista</button></div><div id="sections-${esc(c.id)}"></div></div>`).join("")}</div><div class="row"><input id="newChapter" placeholder="Uuden luvun otsikko"><button id="addChapter">Lisää luku</button></div></section>`); [cite: 245]
        document.getElementById("saveBook").onclick = async () => { try { await update("books", `?id=${eq(id)}`, { title: document.getElementById("title").value, author: document.getElementById("author").value, description: document.getElementById("desc").value || null }); clearDataCache(); document.getElementById("bookMsg").textContent = "Tallennettu"; } catch (error) { document.getElementById("bookMsg").textContent = error.message; } }; [cite: 246, 247]
        document.getElementById("deleteBook").onclick = async () => { if (!confirm("Poistetaanko kirja kaikkine sisältöineen?")) return; try { await remove("books", `?id=${eq(id)}`); clearDataCache(); location.hash = "#/admin"; } catch (error) { document.getElementById("bookMsg").textContent = error.message; } }; [cite: 248, 249]
        document.getElementById("addChapter").onclick = async () => { const title = document.getElementById("newChapter").value.trim(); if (!title) return; try { await insert("chapters", { book_id: id, title, slug: slugify(title), position: chapters.length }); clearDataCache(); route(); } catch (error) { alert(error.message); } }; [cite: 250, 251, 252]
        document.querySelectorAll("[data-save-chapter]").forEach((button) => button.onclick = async () => { const chapterId = button.dataset.saveChapter; const value = document.querySelector(`[data-title="${chapterId}"]`).value; try { await update("chapters", `?id=${eq(chapterId)}`, { title: value }); clearDataCache(); route(); } catch (error) { alert(error.message); } }); [cite: 252]
        document.querySelectorAll("[data-del-chapter]").forEach((button) => button.onclick = async () => { if (!confirm("Poistetaanko luku?")) return; try { await remove("chapters", `?id=${eq(button.dataset.delChapter)}`); clearDataCache(); route(); } catch (error) { alert(error.message); } }); [cite: 253]
        document.querySelectorAll("[data-open]").forEach((button) => button.onclick = () => loadSections(button.dataset.open)); [cite: 254]
      }

      async function loadSections(chapterId) {
        const target = document.getElementById(`sections-${chapterId}`); [cite: 254]
        const sections = await cachedSelect("sections", `?select=*&chapter_id=${eq(chapterId)}&order=position.asc`); [cite: 255]
        target.innerHTML = `<div class="panel">${sections.map((s) => `<div class="field"><label>Osion otsikko</label><input data-section-title="${esc(s.id)}" value="${esc(s.title ?? "")}"></div><div class="field"><label>Sisältö</label><textarea data-section-text="${esc(s.id)}">${esc(docToText(s.content))}</textarea></div><div class="row" style="margin-bottom:20px"><button data-save-section="${esc(s.id)}">Tallenna osio</button><button class="danger" data-del-section="${esc(s.id)}">Poista osio</button></div>`).join("")}<button class="secondary" id="addSection-${chapterId}">Lisää osio</button></div>`; [cite: 255]
        document.getElementById(`addSection-${chapterId}`).onclick = async () => { try { await insert("sections", { chapter_id: chapterId, title: null, content: textToDoc(""), position: sections.length }); clearDataCache(); loadSections(chapterId); } catch (error) { alert(error.message); } }; [cite: 256, 257]
        target.querySelectorAll("[data-save-section]").forEach((button) => button.onclick = async () => { const sectionId = button.dataset.saveSection; const title = target.querySelector(`[data-section-title="${sectionId}"]`).value; const text = target.querySelector(`[data-section-text="${sectionId}"]`).value; try { await update("sections", `?id=${eq(sectionId)}`, { title: title || null, content: textToDoc(text) }); clearDataCache(); alert("Tallennettu"); } catch (error) { alert(error.message); } }); [cite: 257]
        target.querySelectorAll("[data-del-section]").forEach((button) => button.onclick = async () => { if (!confirm("Poistetaanko osio?")) return; try { await remove("sections", `?id=${eq(button.dataset.delSection)}`); clearDataCache(); loadSections(chapterId); } catch (error) { alert(error.message); } }); [cite: 258]
      }

      // REITITYS
      async function route() {
        const parts = path().split("/").filter(Boolean).map(decodeURIComponent); [cite: 259]
        try {
          if (session?.user?.id && adminRoleUser !== session.user.id) await refreshAuth(); [cite: 260]
          else void refreshAuth().catch(() => {}); [cite: 261]
          if (!parts.length || (parts[0] === "books" && !parts[1])) return home(); [cite: 261]
          if (parts[0] === "login") return login(); [cite: 262]
          if (parts[0] === "admin" && !parts[1]) return admin(); [cite: 262]
          if (parts[0] === "admin" && parts[1] === "books" && parts[2]) return adminBook(parts[2]); [cite: 263]
          if (parts[0] === "books" && parts[1] && parts[2]) return chapter(parts[1], parts[2]); [cite: 264]
          if (parts[0] === "books" && parts[1]) return book(parts[1]); [cite: 264]
          setError("Sivua ei löytynyt."); [cite: 265]
        } catch (error) {
          setError(error.message || "Tuntematon virhe"); [cite: 265, 266]
        }
      }
      window.addEventListener("hashchange", route); [cite: 266]
      route(); [cite: 266]
    </script>
