<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Käyhkö – Kirjat</title>
    <meta name="description" content="Harri Käyhkön kirjat luettavaksi verkossa." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Work+Sans:wght@300;400;500;600;700&display=swap" />
    <style>
      :root {
        --bg: #faf8f2;
        --fg: #3a332a;
        --muted: #746b5f;
        --line: #ded3c2;
        --card: #fffdf8;
        --soft: #f1eadf;
        --accent: #8b7355;
        --danger: #b42318;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--fg); font-family: "Work Sans", system-ui, sans-serif; }
      h1, h2, h3 { font-family: "Instrument Serif", Georgia, serif; font-weight: 400; line-height: 1.04; margin: 0; }
      a { color: inherit; text-decoration: none; }
      button, input, textarea { font: inherit; }
      header { position: sticky; top: 0; z-index: 5; border-bottom: 1px solid var(--line); background: color-mix(in srgb, var(--bg) 88%, transparent); backdrop-filter: blur(12px); }
      .bar, main, footer { width: min(100% - 48px, 980px); margin: 0 auto; }
      .bar { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; gap: 18px; }
      .brand { font-family: "Instrument Serif", Georgia, serif; font-size: 30px; }
      nav { display: flex; align-items: center; gap: 16px; font-size: 14px; color: var(--muted); }
      nav a:hover, .link:hover { color: var(--fg); }
      main { padding: 56px 0 76px; min-height: calc(100vh - 142px); }
      footer { border-top: 1px solid var(--line); padding: 24px 0; text-align: center; color: var(--muted); font-size: 12px; }
      .hero { margin-bottom: 44px; }
      .hero h1 { font-size: clamp(48px, 9vw, 76px); }
      .hero p { max-width: 620px; color: var(--muted); line-height: 1.7; }
      .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
      .card { display: block; border: 1px solid var(--line); border-radius: 10px; background: var(--card); padding: 24px; }
      .card:hover { border-color: var(--accent); }
      .card h2 { font-size: 31px; }
      .muted { color: var(--muted); }
      .small { font-size: 14px; }
      .back { display: inline-block; margin-bottom: 28px; color: var(--muted); font-size: 14px; }
      .book-title { font-size: clamp(42px, 8vw, 68px); }
      .chapter-title { font-size: clamp(36px, 7vw, 56px); }
      .toc { list-style: none; padding: 0; margin: 28px 0 0; }
      .toc a { display: flex; gap: 14px; align-items: baseline; padding: 12px 10px; border-radius: 8px; }
      .toc a:hover { background: var(--soft); }
      .num { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--muted); font-size: 13px; }
      .reader { max-width: 72ch; font-size: 18px; line-height: 1.78; }
      .reader p { margin: 0 0 1.25em; }
      .reader h1, .reader h2, .reader h3 { margin: 1.7em 0 .55em; }
      .reader h1 { font-size: 40px; }
      .reader h2 { font-size: 31px; }
      .reader h3 { font-size: 25px; }
      .reader blockquote { margin: 1.4em 0; padding-left: 1em; border-left: 3px solid var(--accent); color: var(--muted); font-style: italic; }
      .reader ul, .reader ol { padding-left: 1.4em; }
      .pager { display: flex; justify-content: space-between; gap: 18px; margin-top: 60px; padding-top: 22px; border-top: 1px solid var(--line); color: var(--muted); font-size: 14px; }
      .right { text-align: right; margin-left: auto; }
      .form { max-width: 430px; }
      .field { display: grid; gap: 7px; margin: 0 0 16px; }
      label { font-size: 13px; color: var(--muted); }
      input, textarea { width: 100%; border: 1px solid var(--line); border-radius: 8px; background: var(--card); color: var(--fg); padding: 11px 12px; }
      textarea { min-height: 160px; resize: vertical; }
      button, .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: 1px solid var(--accent); border-radius: 8px; background: var(--accent); color: #fffdf8; padding: 10px 14px; cursor: pointer; }
      button.secondary, .btn.secondary { background: transparent; color: var(--fg); border-color: var(--line); }
      button.danger { background: var(--danger); border-color: var(--danger); }
      button:disabled { opacity: .6; cursor: not-allowed; }
      .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      .admin-list { display: grid; gap: 10px; margin-top: 18px; }
      .panel { border: 1px solid var(--line); border-radius: 10px; background: var(--card); padding: 20px; margin-top: 24px; }
      .chapter-edit { border: 1px solid var(--line); border-radius: 10px; padding: 14px; margin: 12px 0; background: var(--bg); }
      .status { color: var(--muted); padding: 24px 0; }
      .error { color: var(--danger); }
      [contenteditable="true"] { outline: none; }
      [contenteditable="true"]:hover { background: color-mix(in srgb, var(--accent) 6%, transparent); border-radius: 4px; }
      [contenteditable="true"]:focus { background: color-mix(in srgb, var(--accent) 10%, transparent); box-shadow: 0 0 0 2px var(--accent); border-radius: 4px; }
      .edit-badge { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: #fffdf8; padding: 10px 16px; border-radius: 999px; font-size: 13px; box-shadow: 0 6px 20px rgba(0,0,0,.15); z-index: 50; opacity: 0; transition: opacity .2s; pointer-events: none; }
      .edit-badge.show { opacity: 1; }
      .edit-hint { position: fixed; top: 70px; right: 20px; background: var(--card); border: 1px solid var(--accent); color: var(--accent); padding: 6px 12px; border-radius: 999px; font-size: 12px; z-index: 50; }
      .section-add { display: block; margin: 20px 0; padding: 10px; border: 1px dashed var(--line); background: transparent; color: var(--muted); width: 100%; }
      .section-del { float: right; margin-top: -8px; background: transparent; color: var(--danger); border-color: var(--line); padding: 4px 10px; font-size: 12px; }
      @media (max-width: 720px) {
        .bar, main, footer { width: min(100% - 32px, 980px); }
        .grid { grid-template-columns: 1fr; }
        nav { gap: 10px; }
        .brand { font-size: 26px; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="bar">
        <a class="brand" href="#/">Käyhkö</a>
        <nav id="nav"><a href="#/">Kirjat</a><a href="#/login">Kirjaudu</a></nav>
      </div>
    </header>
    <main id="app"><p class="status">Ladataan…</p></main>
    <footer>© <span id="year"></span> Harri Käyhkö</footer>

    <script>
      window.addEventListener("error", (event) => {
        const appNode = document.getElementById("app");
        if (appNode) appNode.innerHTML = `<p class="error">Virhe: ${escapeHtml(event.message || "sovellus ei käynnistynyt")}</p>`;
      });

      const SUPABASE_URL = "https://etbjymyxiekkkvqwcygp.supabase.co";
      const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInJlZiI6ImV0Ymp5bXl4aWVra2t2cXdjeWdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NTY2OTIsImV4cCI6MjA5NDQzMjY5Mn0.3rBdjPi3lqKW1erTPm_URxDpqrjMbelqidaP69uUowM".replace("eyJpc3MiOiJIUzI1NiIs", "eyJpc3MiOiJzdXBhYmFzZSIs");
      const SESSION_KEY = "kayhko_session_vanilla";
      const app = document.getElementById("app");
      const nav = document.getElementById("nav");
      document.getElementById("year").textContent = new Date().getFullYear();

      let session = readSession();
      let isAdmin = false;

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>'"]/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;" })[char]);
      }
      const esc = escapeHtml;
      const slugify = (s) => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
      const path = () => {
        const hashPath = location.hash.replace(/^#/, "");
        return hashPath ? (hashPath.startsWith("/") ? hashPath : `/${hashPath}`) : "/";
      };
      const setStatus = (text) => { app.innerHTML = `<p class="status">${esc(text)}</p>`; };
      const setError = (text) => { app.innerHTML = `<p class="error">${esc(text)}</p>`; };
      function withTimeout(promise, ms = 8000) {
        let timer;
        const timeout = new Promise((_, reject) => {
          timer = setTimeout(() => reject(new Error("Yhteys aikakatkaistiin. Päivitä sivu.")), ms);
        });
        return Promise.race([promise, timeout]).finally(() => clearTimeout(timer));
      }
      function readSession() {
        try { return JSON.parse(localStorage.getItem(SESSION_KEY) || "null"); }
        catch { return null; }
      }
      function saveSession(nextSession) {
        session = nextSession;
        if (nextSession) localStorage.setItem(SESSION_KEY, JSON.stringify(nextSession));
        else localStorage.removeItem(SESSION_KEY);
      }
      function headers(prefer) {
        const token = session?.access_token || SUPABASE_KEY;
        return {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${token}`,
          "Content-Type": "application/json",
          ...(prefer ? { Prefer: prefer } : {}),
        };
      }
      async function request(url, options = {}) {
        const res = await withTimeout(fetch(url, options));
        if (!res.ok) {
          const body = await res.text().catch(() => "");
          throw new Error(body || res.statusText || "Pyyntö epäonnistui");
        }
        if (res.status === 204) return null;
        return res.json();
      }
      const restUrl = (table, query = "") => `${SUPABASE_URL}/rest/v1/${table}${query}`;
      const eq = (value) => `eq.${encodeURIComponent(value)}`;
      const select = (table, query) => request(restUrl(table, query), { headers: headers() });
      const insert = (table, body) => request(restUrl(table), { method: "POST", headers: headers("return=representation"), body: JSON.stringify(body) });
      const update = (table, query, body) => request(restUrl(table, query), { method: "PATCH", headers: headers("return=representation"), body: JSON.stringify(body) });
      const remove = (table, query) => request(restUrl(table, query), { method: "DELETE", headers: headers(), body: undefined });
      async function hasAdminRole() {
        if (!session?.user?.id) return false;
        try {
          const result = await request(`${SUPABASE_URL}/rest/v1/rpc/has_role`, {
            method: "POST",
            headers: headers(),
            body: JSON.stringify({ _user_id: session.user.id, _role: "admin" }),
          });
          return !!result;
        } catch {
          return false;
        }
      }
      async function refreshAuth() {
        isAdmin = await withTimeout(hasAdminRole(), 3000).catch(() => false);
        nav.innerHTML = `<a href="#/">Kirjat</a>${isAdmin ? `<a href="#/admin">Admin</a>` : ""}${session ? `<button class="secondary" id="logout" type="button">Kirjaudu ulos</button>` : `<a href="#/login">Kirjaudu</a>`}`;
        document.getElementById("logout")?.addEventListener("click", () => { saveSession(null); isAdmin = false; renderNavOnly(); location.hash = "#/"; });
      }
      function renderNavOnly() {
        nav.innerHTML = `<a href="#/">Kirjat</a><a href="#/login">Kirjaudu</a>`;
      }

      function renderInline(nodes = []) {
        return nodes.map((n) => {
          if (n.type === "hardBreak") return "<br>";
          let out = esc(n.text ?? "");
          for (const m of n.marks ?? []) {
            if (m.type === "bold") out = `<strong>${out}</strong>`;
            if (m.type === "italic") out = `<em>${out}</em>`;
            if (m.type === "code") out = `<code>${out}</code>`;
          }
          return out;
        }).join("");
      }
      function renderDoc(doc) {
        const nodes = doc && typeof doc === "object" ? doc.content ?? [] : [];
        return nodes.map((n) => {
          if (n.type === "paragraph") return `<p>${renderInline(n.content)}</p>`;
          if (n.type === "heading") { const level = Math.min(Math.max(Number(n.attrs?.level || 2), 1), 3); return `<h${level}>${renderInline(n.content)}</h${level}>`; }
          if (n.type === "blockquote") return `<blockquote>${renderDoc({ content: n.content })}</blockquote>`;
          if (n.type === "bulletList") return `<ul>${(n.content ?? []).map((li) => `<li>${renderDoc({ content: li.content })}</li>`).join("")}</ul>`;
          if (n.type === "orderedList") return `<ol>${(n.content ?? []).map((li) => `<li>${renderDoc({ content: li.content })}</li>`).join("")}</ol>`;
          return "";
        }).join("");
      }
      function docToText(doc) {
        const out = [];
        const walk = (nodes = []) => nodes.forEach((n) => {
          if (n.text) out.push(n.text);
          if (n.type === "paragraph" || n.type === "heading") out.push("\n\n");
          if (n.content) walk(n.content);
        });
        walk(doc?.content ?? []);
        return out.join("").replace(/\n{3,}/g, "\n\n").trim();
      }
      function textToDoc(text) {
        const paragraphs = String(text || "").split(/\n\s*\n/).map((p) => p.trim()).filter(Boolean);
        return { type: "doc", content: (paragraphs.length ? paragraphs : [""]).map((p) => ({ type: "paragraph", content: p ? [{ type: "text", text: p }] : [] })) };
      }

      async function home() {
        setStatus("Ladataan…");
        const books = await select("books", "?select=*&order=position.asc");
        app.innerHTML = `<section class="hero"><h1>Kirjasto</h1><p>Harri Käyhkön julkaisemat tekstit – luettavissa verkossa.</p></section><section class="grid">${books.map((b) => `<a class="card" href="#/books/${esc(b.slug)}"><h2>${esc(b.title)}</h2><p class="muted small">${esc(b.author)}</p>${b.description ? `<p>${esc(b.description)}</p>` : ""}</a>`).join("") || `<p class="muted">Ei vielä kirjoja.</p>`}</section>`;
      }
      async function book(slug) {
        setStatus("Ladataan…");
        const books = await select("books", `?select=*&slug=${eq(slug)}&limit=1`);
        const currentBook = books[0];
        if (!currentBook) return setError("Kirjaa ei löytynyt.");
        const chapters = await select("chapters", `?select=*&book_id=${eq(currentBook.id)}&order=position.asc`);
        app.innerHTML = `<a class="back" href="#/">← Kirjat</a><h1 class="book-title">${esc(currentBook.title)}</h1><p class="muted">${esc(currentBook.author)}</p>${currentBook.description ? `<p class="reader">${esc(currentBook.description)}</p>` : ""}<h2 style="margin-top:48px;font-size:32px">Sisällysluettelo</h2><ol class="toc">${chapters.map((c, i) => `<li><a href="#/books/${esc(slug)}/${esc(c.slug)}"><span class="num">${String(i + 1).padStart(2, "0")}</span><span style="font-family:Instrument Serif,Georgia,serif;font-size:22px">${esc(c.title)}</span></a></li>`).join("") || `<li class="muted">Ei vielä lukuja.</li>`}</ol>`;
      }
      async function chapter(slug, chapterSlug) {
        setStatus("Ladataan…");
        const books = await select("books", `?select=id,title,slug&slug=${eq(slug)}&limit=1`);
        const currentBook = books[0];
        if (!currentBook) return setError("Kirjaa ei löytynyt.");
        const chapters = await select("chapters", `?select=*&book_id=${eq(currentBook.id)}&slug=${eq(chapterSlug)}&limit=1`);
        const currentChapter = chapters[0];
        if (!currentChapter) return setError("Lukua ei löytynyt.");
        const sections = await select("sections", `?select=*&chapter_id=${eq(currentChapter.id)}&order=position.asc`);
        const all = await select("chapters", `?select=slug,title,position&book_id=${eq(currentBook.id)}&order=position.asc`);
        const idx = all.findIndex((c) => c.slug === chapterSlug);
        const prev = idx > 0 ? all[idx - 1] : null;
        const next = idx >= 0 && idx < all.length - 1 ? all[idx + 1] : null;
        app.innerHTML = `<article><a class="back" href="#/books/${esc(slug)}">← ${esc(currentBook.title)}</a><h1 class="chapter-title">${esc(currentChapter.title)}</h1><div class="reader" style="margin-top:40px">${sections.map((s) => `<section>${s.title ? `<h2>${esc(s.title)}</h2>` : ""}${renderDoc(s.content)}</section>`).join("")}</div><nav class="pager">${prev ? `<a href="#/books/${esc(slug)}/${esc(prev.slug)}">← ${esc(prev.title)}</a>` : `<span></span>`}${next ? `<a class="right" href="#/books/${esc(slug)}/${esc(next.slug)}">${esc(next.title)} →</a>` : `<span></span>`}</nav></article>`;
      }
      function login() {
        app.innerHTML = `<section class="form"><h1 style="font-size:40px">Kirjaudu sisään</h1><p class="muted">Vain admin voi muokata sisältöä.</p><form id="loginForm" class="panel"><div class="field"><label>Sähköposti</label><input id="email" type="email" autocomplete="email" required></div><div class="field"><label>Salasana</label><input id="password" type="password" autocomplete="current-password" required></div><button id="loginButton" type="submit">Kirjaudu</button><p id="loginMsg" class="error"></p></form></section>`;
        document.getElementById("loginForm").addEventListener("submit", async (event) => {
          event.preventDefault();
          const button = document.getElementById("loginButton");
          const message = document.getElementById("loginMsg");
          button.disabled = true;
          message.textContent = "";
          try {
            const auth = await request(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
              method: "POST",
              headers: { apikey: SUPABASE_KEY, "Content-Type": "application/json" },
              body: JSON.stringify({ email: document.getElementById("email").value, password: document.getElementById("password").value }),
            });
            saveSession(auth);
            await refreshAuth();
            location.hash = "#/admin";
          } catch (error) {
            message.textContent = error.message || "Kirjautuminen epäonnistui.";
          } finally {
            button.disabled = false;
          }
        });
      }
      async function admin() {
        setStatus("Tarkistetaan oikeuksia…");
        await refreshAuth();
        if (!isAdmin) { location.hash = "#/login"; return; }
        const books = await select("books", "?select=*&order=position.asc");
        app.innerHTML = `<h1 style="font-size:48px">Hallinta</h1><section class="panel"><h2>Kirjat</h2><div class="admin-list">${books.map((b) => `<a class="card" href="#/admin/books/${esc(b.id)}"><strong>${esc(b.title)}</strong><span class="muted small">${esc(b.author)}</span></a>`).join("")}</div></section><section class="panel"><h2>Lisää uusi kirja</h2><div class="field"><label>Otsikko</label><input id="newTitle"></div><div class="field"><label>Kirjoittaja</label><input id="newAuthor" value="Harri Käyhkö"></div><div class="field"><label>Kuvaus</label><textarea id="newDesc"></textarea></div><button id="createBook">Lisää</button><p id="adminMsg" class="error"></p></section>`;
        document.getElementById("createBook").onclick = async () => {
          const title = document.getElementById("newTitle").value.trim();
          if (!title) return;
          try {
            await insert("books", { title, author: document.getElementById("newAuthor").value || "Harri Käyhkö", description: document.getElementById("newDesc").value || null, slug: slugify(title), position: books.length });
            route();
          } catch (error) { document.getElementById("adminMsg").textContent = error.message; }
        };
      }
      async function adminBook(id) {
        setStatus("Tarkistetaan oikeuksia…");
        await refreshAuth();
        if (!isAdmin) { location.hash = "#/login"; return; }
        const books = await select("books", `?select=*&id=${eq(id)}&limit=1`);
        const currentBook = books[0];
        if (!currentBook) return setError("Kirjaa ei löytynyt.");
        const chapters = await select("chapters", `?select=*&book_id=${eq(id)}&order=position.asc`);
        app.innerHTML = `<a class="back" href="#/admin">← Hallinta</a><section class="panel"><h1 style="font-size:40px">Kirjan tiedot</h1><div class="field"><label>Otsikko</label><input id="title" value="${esc(currentBook.title)}"></div><div class="field"><label>Kirjoittaja</label><input id="author" value="${esc(currentBook.author)}"></div><div class="field"><label>Kuvaus</label><textarea id="desc">${esc(currentBook.description ?? "")}</textarea></div><div class="row"><button id="saveBook">Tallenna</button><button class="danger" id="deleteBook">Poista</button><span id="bookMsg" class="muted small"></span></div></section><section class="panel"><h2>Luvut</h2><div id="chapters">${chapters.map((c) => `<div class="chapter-edit"><div class="row"><input data-title="${esc(c.id)}" value="${esc(c.title)}"><button class="secondary" data-save-chapter="${esc(c.id)}">Tallenna</button><button class="secondary" data-open="${esc(c.id)}">Osiot</button><button class="danger" data-del-chapter="${esc(c.id)}">Poista</button></div><div id="sections-${esc(c.id)}"></div></div>`).join("")}</div><div class="row"><input id="newChapter" placeholder="Uuden luvun otsikko"><button id="addChapter">Lisää luku</button></div></section>`;
        document.getElementById("saveBook").onclick = async () => { try { await update("books", `?id=${eq(id)}`, { title: document.getElementById("title").value, author: document.getElementById("author").value, description: document.getElementById("desc").value || null }); document.getElementById("bookMsg").textContent = "Tallennettu"; } catch (error) { document.getElementById("bookMsg").textContent = error.message; } };
        document.getElementById("deleteBook").onclick = async () => { if (!confirm("Poistetaanko kirja kaikkine sisältöineen?")) return; try { await remove("books", `?id=${eq(id)}`); location.hash = "#/admin"; } catch (error) { document.getElementById("bookMsg").textContent = error.message; } };
        document.getElementById("addChapter").onclick = async () => { const title = document.getElementById("newChapter").value.trim(); if (!title) return; try { await insert("chapters", { book_id: id, title, slug: slugify(title), position: chapters.length }); route(); } catch (error) { alert(error.message); } };
        document.querySelectorAll("[data-save-chapter]").forEach((button) => button.onclick = async () => { const chapterId = button.dataset.saveChapter; const value = document.querySelector(`[data-title="${chapterId}"]`).value; try { await update("chapters", `?id=${eq(chapterId)}`, { title: value }); route(); } catch (error) { alert(error.message); } });
        document.querySelectorAll("[data-del-chapter]").forEach((button) => button.onclick = async () => { if (!confirm("Poistetaanko luku?")) return; try { await remove("chapters", `?id=${eq(button.dataset.delChapter)}`); route(); } catch (error) { alert(error.message); } });
        document.querySelectorAll("[data-open]").forEach((button) => button.onclick = () => loadSections(button.dataset.open));
      }
      async function loadSections(chapterId) {
        const target = document.getElementById(`sections-${chapterId}`);
        const sections = await select("sections", `?select=*&chapter_id=${eq(chapterId)}&order=position.asc`);
        target.innerHTML = `<div class="panel">${sections.map((s) => `<div class="field"><label>Osion otsikko</label><input data-section-title="${esc(s.id)}" value="${esc(s.title ?? "")}"></div><div class="field"><label>Sisältö</label><textarea data-section-text="${esc(s.id)}">${esc(docToText(s.content))}</textarea></div><div class="row" style="margin-bottom:20px"><button data-save-section="${esc(s.id)}">Tallenna osio</button><button class="danger" data-del-section="${esc(s.id)}">Poista osio</button></div>`).join("")}<button class="secondary" id="addSection-${chapterId}">Lisää osio</button></div>`;
        document.getElementById(`addSection-${chapterId}`).onclick = async () => { try { await insert("sections", { chapter_id: chapterId, title: null, content: textToDoc(""), position: sections.length }); loadSections(chapterId); } catch (error) { alert(error.message); } };
        target.querySelectorAll("[data-save-section]").forEach((button) => button.onclick = async () => { const sectionId = button.dataset.saveSection; const title = target.querySelector(`[data-section-title="${sectionId}"]`).value; const text = target.querySelector(`[data-section-text="${sectionId}"]`).value; try { await update("sections", `?id=${eq(sectionId)}`, { title: title || null, content: textToDoc(text) }); alert("Tallennettu"); } catch (error) { alert(error.message); } });
        target.querySelectorAll("[data-del-section]").forEach((button) => button.onclick = async () => { if (!confirm("Poistetaanko osio?")) return; try { await remove("sections", `?id=${eq(button.dataset.delSection)}`); loadSections(chapterId); } catch (error) { alert(error.message); } });
      }
      async function route() {
        const parts = path().split("/").filter(Boolean).map(decodeURIComponent);
        try {
          await refreshAuth();
          if (!parts.length || (parts[0] === "books" && !parts[1])) return home();
          if (parts[0] === "login") return login();
          if (parts[0] === "admin" && !parts[1]) return admin();
          if (parts[0] === "admin" && parts[1] === "books" && parts[2]) return adminBook(parts[2]);
          if (parts[0] === "books" && parts[1] && parts[2]) return chapter(parts[1], parts[2]);
          if (parts[0] === "books" && parts[1]) return book(parts[1]);
          setError("Sivua ei löytynyt.");
        } catch (error) {
          setError(error.message || "Tuntematon virhe");
        }
      }
      window.addEventListener("hashchange", route);
      route();
    </script>
  </body>
</html>
