<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Käyhkö – Kirjat</title>
    <meta name="description" content="Harri Käyhkön kirjat luettavaksi verkossa." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Work+Sans:wght@300;400;500;600;700&display=swap" />
    <style>
      :root {
        --bg: #faf8f2;
        --fg: #3a332a;
        --muted: #746b5f;
        --line: #ded3c2;
        --card: #fffdf8;
        --soft: #f1eadf;
        --accent: #8b7355;
        --danger: #b42318;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--fg); font-family: "Work Sans", system-ui, sans-serif; }
      h1, h2, h3 { font-family: "Instrument Serif", Georgia, serif; font-weight: 400; line-height: 1.04; margin: 0; }
      a { color: inherit; text-decoration: none; }
      button, input, textarea { font: inherit; }
      header { position: sticky; top: 0; z-index: 5; border-bottom: 1px solid var(--line); background: color-mix(in srgb, var(--bg) 88%, transparent); backdrop-filter: blur(12px); }
      .bar, main, footer { width: min(100% - 48px, 980px); margin: 0 auto; }
      .bar { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; gap: 18px; }
      .brand { font-family: "Instrument Serif", Georgia, serif; font-size: 30px; }
      nav { display: flex; align-items: center; gap: 16px; font-size: 14px; color: var(--muted); }
      nav a:hover, .link:hover { color: var(--fg); }
      main { padding: 56px 0 76px; }
      footer { border-top: 1px solid var(--line); padding: 24px 0; text-align: center; color: var(--muted); font-size: 12px; }
      .hero { margin-bottom: 44px; }
      .hero h1 { font-size: clamp(48px, 9vw, 76px); }
      .hero p { max-width: 620px; color: var(--muted); line-height: 1.7; }
      .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
      .card { display: block; border: 1px solid var(--line); border-radius: 10px; background: var(--card); padding: 24px; }
      .card:hover { border-color: var(--accent); }
      .card h2 { font-size: 31px; }
      .muted { color: var(--muted); }
      .small { font-size: 14px; }
      .back { display: inline-block; margin-bottom: 28px; color: var(--muted); font-size: 14px; }
      .book-title { font-size: clamp(42px, 8vw, 68px); }
      .chapter-title { font-size: clamp(36px, 7vw, 56px); }
      .toc { list-style: none; padding: 0; margin: 28px 0 0; }
      .toc a { display: flex; gap: 14px; align-items: baseline; padding: 12px 10px; border-radius: 8px; }
      .toc a:hover { background: var(--soft); }
      .num { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--muted); font-size: 13px; }
      .reader { max-width: 72ch; font-size: 18px; line-height: 1.78; }
      .reader p { margin: 0 0 1.25em; }
      .reader h1, .reader h2, .reader h3 { margin: 1.7em 0 .55em; }
      .reader h1 { font-size: 40px; }
      .reader h2 { font-size: 31px; }
      .reader h3 { font-size: 25px; }
      .reader blockquote { margin: 1.4em 0; padding-left: 1em; border-left: 3px solid var(--accent); color: var(--muted); font-style: italic; }
      .reader ul, .reader ol { padding-left: 1.4em; }
      .pager { display: flex; justify-content: space-between; gap: 18px; margin-top: 60px; padding-top: 22px; border-top: 1px solid var(--line); color: var(--muted); font-size: 14px; }
      .right { text-align: right; margin-left: auto; }
      .form { max-width: 430px; }
      .field { display: grid; gap: 7px; margin: 0 0 16px; }
      label { font-size: 13px; color: var(--muted); }
      input, textarea { width: 100%; border: 1px solid var(--line); border-radius: 8px; background: var(--card); color: var(--fg); padding: 11px 12px; }
      textarea { min-height: 120px; resize: vertical; }
      button, .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: 1px solid var(--accent); border-radius: 8px; background: var(--accent); color: #fffdf8; padding: 10px 14px; cursor: pointer; }
      button.secondary, .btn.secondary { background: transparent; color: var(--fg); border-color: var(--line); }
      button.danger { background: var(--danger); border-color: var(--danger); }
      .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      .admin-list { display: grid; gap: 10px; margin-top: 18px; }
      .panel { border: 1px solid var(--line); border-radius: 10px; background: var(--card); padding: 20px; margin-top: 24px; }
      .chapter-edit { border: 1px solid var(--line); border-radius: 10px; padding: 14px; margin: 12px 0; background: var(--bg); }
      .status { color: var(--muted); padding: 24px 0; }
      .error { color: var(--danger); }
      @media (max-width: 720px) {
        .bar, main, footer { width: min(100% - 32px, 980px); }
        .grid { grid-template-columns: 1fr; }
        nav { gap: 10px; }
        .brand { font-size: 26px; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="bar">
        <a class="brand" href="#/">Käyhkö</a>
        <nav id="nav"><a href="#/">Kirjat</a><a href="#/login">Kirjaudu</a></nav>
      </div>
    </header>
    <main id="app"><p class="status">Ladataan…</p></main>
    <footer>© <span id="year"></span> Harri Käyhkö</footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = "https://etbjymyxiekkkvqwcygp.supabase.co";
      const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0Ymp5bXl4aWVra2t2cXdjeWdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NTY2OTIsImV4cCI6MjA5NDQzMjY5Mn0.3rBdjPi3lqKW1erTPm_URxDpqrjMbelqidaP69uUowM";
      const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { persistSession: true, autoRefreshToken: true } });
      const app = document.getElementById("app");
      const nav = document.getElementById("nav");
      document.getElementById("year").textContent = new Date().getFullYear();

      let session = null;
      let isAdmin = false;
      const esc = (v) => String(v ?? "").replace(/[&<>'"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;" })[c]);
      const slugify = (s) => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
      const path = () => {
        const h = location.hash.replace(/^#/, "");
        return h ? (h.startsWith("/") ? h : `/${h}`) : "/";
      };
      const setStatus = (text) => { app.innerHTML = `<p class="status">${esc(text)}</p>`; };
      const setError = (text) => { app.innerHTML = `<p class="error">${esc(text)}</p>`; };

      function renderInline(nodes = []) {
        return nodes.map((n) => {
          if (n.type === "hardBreak") return "<br>";
          let out = esc(n.text ?? "");
          for (const m of n.marks ?? []) {
            if (m.type === "bold") out = `<strong>${out}</strong>`;
            if (m.type === "italic") out = `<em>${out}</em>`;
            if (m.type === "code") out = `<code>${out}</code>`;
          }
          return out;
        }).join("");
      }
      function renderDoc(doc) {
        const nodes = doc && typeof doc === "object" ? doc.content ?? [] : [];
        return nodes.map((n) => {
          if (n.type === "paragraph") return `<p>${renderInline(n.content)}</p>`;
          if (n.type === "heading") return `<h${n.attrs?.level || 2}>${renderInline(n.content)}</h${n.attrs?.level || 2}>`;
          if (n.type === "blockquote") return `<blockquote>${renderDoc({ content: n.content })}</blockquote>`;
          if (n.type === "bulletList") return `<ul>${(n.content ?? []).map((li) => `<li>${renderDoc({ content: li.content })}</li>`).join("")}</ul>`;
          if (n.type === "orderedList") return `<ol>${(n.content ?? []).map((li) => `<li>${renderDoc({ content: li.content })}</li>`).join("")}</ol>`;
          return "";
        }).join("");
      }
      function docToText(doc) {
        const out = [];
        const walk = (nodes = []) => nodes.forEach((n) => {
          if (n.text) out.push(n.text);
          if (n.type === "paragraph" || n.type === "heading") out.push("\n\n");
          if (n.content) walk(n.content);
        });
        walk(doc?.content ?? []);
        return out.join("").replace(/\n{3,}/g, "\n\n").trim();
      }
      function textToDoc(text) {
        return { type: "doc", content: String(text || "").split(/\n\s*\n/).filter(Boolean).map((p) => ({ type: "paragraph", content: [{ type: "text", text: p.trim() }] })) };
      }
      async function refreshAuth() {
        const res = await supabaseClient.auth.getSession();
        session = res.data.session;
        isAdmin = false;
        if (session?.user) {
          const { data } = await supabaseClient.from("user_roles").select("role").eq("user_id", session.user.id).eq("role", "admin").maybeSingle();
          isAdmin = !!data;
        }
        nav.innerHTML = `<a href="#/">Kirjat</a>${isAdmin ? `<a href="#/admin">Admin</a>` : ""}${session ? `<button class="secondary" id="logout" type="button">Kirjaudu ulos</button>` : `<a href="#/login">Kirjaudu</a>`}`;
        document.getElementById("logout")?.addEventListener("click", async () => { await supabaseClient.auth.signOut(); await refreshAuth(); location.hash = "#/"; });
      }

      async function home() {
        setStatus("Ladataan…");
        const { data, error } = await supabaseClient.from("books").select("*").order("position", { ascending: true });
        if (error) return setError(error.message);
        app.innerHTML = `<section class="hero"><h1>Kirjasto</h1><p>Harri Käyhkön julkaisemat tekstit – luettavissa verkossa.</p></section><section class="grid">${(data ?? []).map((b) => `<a class="card" href="#/books/${esc(b.slug)}"><h2>${esc(b.title)}</h2><p class="muted small">${esc(b.author)}</p>${b.description ? `<p>${esc(b.description)}</p>` : ""}</a>`).join("") || `<p class="muted">Ei vielä kirjoja.</p>`}</section>`;
      }
      async function book(slug) {
        setStatus("Ladataan…");
        const { data: book, error } = await supabaseClient.from("books").select("*").eq("slug", slug).maybeSingle();
        if (error) return setError(error.message);
        if (!book) return setError("Kirjaa ei löytynyt.");
        const { data: chapters } = await supabaseClient.from("chapters").select("*").eq("book_id", book.id).order("position", { ascending: true });
        app.innerHTML = `<a class="back" href="#/">← Kirjat</a><h1 class="book-title">${esc(book.title)}</h1><p class="muted">${esc(book.author)}</p>${book.description ? `<p class="reader">${esc(book.description)}</p>` : ""}<h2 style="margin-top:48px;font-size:32px">Sisällysluettelo</h2><ol class="toc">${(chapters ?? []).map((c, i) => `<li><a href="#/books/${esc(slug)}/${esc(c.slug)}"><span class="num">${String(i + 1).padStart(2, "0")}</span><span style="font-family:Instrument Serif,Georgia,serif;font-size:22px">${esc(c.title)}</span></a></li>`).join("") || `<li class="muted">Ei vielä lukuja.</li>`}</ol>`;
      }
      async function chapter(slug, chapterSlug) {
        setStatus("Ladataan…");
        const { data: book } = await supabaseClient.from("books").select("id,title,slug").eq("slug", slug).maybeSingle();
        if (!book) return setError("Kirjaa ei löytynyt.");
        const { data: chapter } = await supabaseClient.from("chapters").select("*").eq("book_id", book.id).eq("slug", chapterSlug).maybeSingle();
        if (!chapter) return setError("Lukua ei löytynyt.");
        const { data: sections } = await supabaseClient.from("sections").select("*").eq("chapter_id", chapter.id).order("position", { ascending: true });
        const { data: all } = await supabaseClient.from("chapters").select("slug,title,position").eq("book_id", book.id).order("position", { ascending: true });
        const idx = (all ?? []).findIndex((c) => c.slug === chapterSlug), prev = idx > 0 ? all[idx - 1] : null, next = idx >= 0 && idx < all.length - 1 ? all[idx + 1] : null;
        app.innerHTML = `<article><a class="back" href="#/books/${esc(slug)}">← ${esc(book.title)}</a><h1 class="chapter-title">${esc(chapter.title)}</h1><div class="reader" style="margin-top:40px">${(sections ?? []).map((s) => `<section>${s.title ? `<h2>${esc(s.title)}</h2>` : ""}${renderDoc(s.content)}</section>`).join("")}</div><nav class="pager">${prev ? `<a href="#/books/${esc(slug)}/${esc(prev.slug)}">← ${esc(prev.title)}</a>` : `<span></span>`}${next ? `<a class="right" href="#/books/${esc(slug)}/${esc(next.slug)}">${esc(next.title)} →</a>` : `<span></span>`}</nav></article>`;
      }
      function login() {
        app.innerHTML = `<section class="form"><h1 style="font-size:40px">Kirjaudu sisään</h1><p class="muted">Vain admin voi muokata sisältöä.</p><form id="loginForm" class="panel"><div class="field"><label>Sähköposti</label><input id="email" type="email" required></div><div class="field"><label>Salasana</label><input id="password" type="password" required></div><button type="submit">Kirjaudu</button><p id="loginMsg" class="error"></p></form></section>`;
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
          e.preventDefault();
          const { error } = await supabaseClient.auth.signInWithPassword({ email: email.value, password: password.value });
          if (error) loginMsg.textContent = error.message;
          else { await refreshAuth(); location.hash = "#/admin"; }
        });
      }
      async function admin() {
        await refreshAuth();
        if (!isAdmin) { location.hash = "#/login"; return; }
        const { data: books, error } = await supabaseClient.from("books").select("*").order("position", { ascending: true });
        if (error) return setError(error.message);
        app.innerHTML = `<h1 style="font-size:48px">Hallinta</h1><section class="panel"><h2>Kirjat</h2><div class="admin-list">${(books ?? []).map((b) => `<a class="card" href="#/admin/books/${esc(b.id)}"><strong>${esc(b.title)}</strong><span class="muted small">${esc(b.author)}</span></a>`).join("")}</div></section><section class="panel"><h2>Lisää uusi kirja</h2><div class="field"><label>Otsikko</label><input id="newTitle"></div><div class="field"><label>Kirjoittaja</label><input id="newAuthor" value="Harri Käyhkö"></div><div class="field"><label>Kuvaus</label><textarea id="newDesc"></textarea></div><button id="createBook">Lisää</button><p id="adminMsg" class="error"></p></section>`;
        createBook.onclick = async () => {
          const title = newTitle.value.trim();
          if (!title) return;
          const { error } = await supabaseClient.from("books").insert({ title, author: newAuthor.value || "Harri Käyhkö", description: newDesc.value || null, slug: slugify(title), position: books?.length ?? 0 });
          if (error) adminMsg.textContent = error.message; else route();
        };
      }
      async function adminBook(id) {
        await refreshAuth();
        if (!isAdmin) { location.hash = "#/login"; return; }
        const { data: b, error } = await supabaseClient.from("books").select("*").eq("id", id).single();
        if (error) return setError(error.message);
        const { data: chapters } = await supabaseClient.from("chapters").select("*").eq("book_id", id).order("position", { ascending: true });
        app.innerHTML = `<a class="back" href="#/admin">← Hallinta</a><section class="panel"><h1 style="font-size:40px">Kirjan tiedot</h1><div class="field"><label>Otsikko</label><input id="title" value="${esc(b.title)}"></div><div class="field"><label>Kirjoittaja</label><input id="author" value="${esc(b.author)}"></div><div class="field"><label>Kuvaus</label><textarea id="desc">${esc(b.description ?? "")}</textarea></div><div class="row"><button id="saveBook">Tallenna</button><button class="danger" id="deleteBook">Poista</button><span id="bookMsg" class="muted small"></span></div></section><section class="panel"><h2>Luvut</h2><div id="chapters">${(chapters ?? []).map((c) => `<div class="chapter-edit"><div class="row"><input data-title="${esc(c.id)}" value="${esc(c.title)}"><button class="secondary" data-save-chapter="${esc(c.id)}">Tallenna</button><button class="secondary" data-open="${esc(c.id)}">Osiot</button><button class="danger" data-del-chapter="${esc(c.id)}">Poista</button></div><div id="sections-${esc(c.id)}"></div></div>`).join("")}</div><div class="row"><input id="newChapter" placeholder="Uuden luvun otsikko"><button id="addChapter">Lisää luku</button></div></section>`;
        saveBook.onclick = async () => { const { error } = await supabaseClient.from("books").update({ title: title.value, author: author.value, description: desc.value || null }).eq("id", id); bookMsg.textContent = error ? error.message : "Tallennettu"; };
        deleteBook.onclick = async () => { if (!confirm("Poistetaanko kirja kaikkine sisältöineen?")) return; const { error } = await supabaseClient.from("books").delete().eq("id", id); if (error) bookMsg.textContent = error.message; else location.hash = "#/admin"; };
        addChapter.onclick = async () => { const t = newChapter.value.trim(); if (!t) return; const { error } = await supabaseClient.from("chapters").insert({ book_id: id, title: t, slug: slugify(t), position: chapters?.length ?? 0 }); if (error) alert(error.message); else route(); };
        document.querySelectorAll("[data-save-chapter]").forEach((btn) => btn.onclick = async () => { const cid = btn.dataset.saveChapter; const val = document.querySelector(`[data-title="${cid}"]`).value; const { error } = await supabaseClient.from("chapters").update({ title: val }).eq("id", cid); if (error) alert(error.message); else route(); });
        document.querySelectorAll("[data-del-chapter]").forEach((btn) => btn.onclick = async () => { if (!confirm("Poistetaanko luku?")) return; const { error } = await supabaseClient.from("chapters").delete().eq("id", btn.dataset.delChapter); if (error) alert(error.message); else route(); });
        document.querySelectorAll("[data-open]").forEach((btn) => btn.onclick = () => loadSections(btn.dataset.open));
      }
      async function loadSections(chapterId) {
        const target = document.getElementById(`sections-${chapterId}`);
        const { data } = await supabaseClient.from("sections").select("*").eq("chapter_id", chapterId).order("position", { ascending: true });
        target.innerHTML = `<div class="panel">${(data ?? []).map((s) => `<div class="field"><label>Osion otsikko</label><input data-section-title="${esc(s.id)}" value="${esc(s.title ?? "")}"></div><div class="field"><label>Sisältö</label><textarea data-section-text="${esc(s.id)}">${esc(docToText(s.content))}</textarea></div><div class="row" style="margin-bottom:20px"><button data-save-section="${esc(s.id)}">Tallenna osio</button><button class="danger" data-del-section="${esc(s.id)}">Poista osio</button></div>`).join("")}<button class="secondary" id="addSection-${chapterId}">Lisää osio</button></div>`;
        document.getElementById(`addSection-${chapterId}`).onclick = async () => { const { error } = await supabaseClient.from("sections").insert({ chapter_id: chapterId, title: null, content: textToDoc(""), position: data?.length ?? 0 }); if (error) alert(error.message); else loadSections(chapterId); };
        target.querySelectorAll("[data-save-section]").forEach((btn) => btn.onclick = async () => { const sid = btn.dataset.saveSection; const title = target.querySelector(`[data-section-title="${sid}"]`).value; const text = target.querySelector(`[data-section-text="${sid}"]`).value; const { error } = await supabaseClient.from("sections").update({ title: title || null, content: textToDoc(text) }).eq("id", sid); if (error) alert(error.message); else alert("Tallennettu"); });
        target.querySelectorAll("[data-del-section]").forEach((btn) => btn.onclick = async () => { if (!confirm("Poistetaanko osio?")) return; const { error } = await supabaseClient.from("sections").delete().eq("id", btn.dataset.delSection); if (error) alert(error.message); else loadSections(chapterId); });
      }
      async function route() {
        await refreshAuth();
        const parts = path().split("/").filter(Boolean).map(decodeURIComponent);
        try {
          if (!parts.length || parts[0] === "books" && !parts[1]) return home();
          if (parts[0] === "login") return login();
          if (parts[0] === "admin" && !parts[1]) return admin();
          if (parts[0] === "admin" && parts[1] === "books" && parts[2]) return adminBook(parts[2]);
          if (parts[0] === "books" && parts[1] && parts[2]) return chapter(parts[1], parts[2]);
          if (parts[0] === "books" && parts[1]) return book(parts[1]);
          setError("Sivua ei löytynyt.");
        } catch (e) { setError(e.message || "Tuntematon virhe"); }
      }
      window.addEventListener("hashchange", route);
      supabaseClient.auth.onAuthStateChange(() => refreshAuth());
      route();
    </script>
  </body>
</html>
